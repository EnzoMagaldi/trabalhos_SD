syntax = "proto3";

message AssinaturaRequest {
  string nome_cliente = 1;
  string topico = 2;
}

message Noticia {
  string jornal = 1;
  string titulo = 2;
  string conteudo = 3;
  string timestamp = 4;
}

message PublicarRequest {
  string topico = 1;
  string titulo = 2;
  string conteudo = 3;
}

message PublicarResponse {
  bool sucesso = 1;
  string mensagem = 2;
}

service JornalService {
  rpc AssinarJornal(AssinaturaRequest) returns (stream Noticia);
  
  rpc PublicarNoticia(PublicarRequest) returns (PublicarResponse);
}